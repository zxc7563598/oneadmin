  resp.RolePermissionsResp:
    properties:
      menu:
        items:
          $ref: '#/definitions/resp.RoleMenuItem'
        type: array
    type: object
  response.Response:
    properties:
      code:
        description: 响应code
        example: 0
        type: integer
      data:
        description: 响应数据
