basePath: /
definitions:
  input.AdminChangePasswordReq:
    properties:
      newPassword:
        description: 新密码
        example: "654321"
        maxLength: 32
        minLength: 6
        type: string
      oldPassword:
        description: 旧密码
        example: "123456"
        maxLength: 32
        minLength: 6
        type: string
    required:
    - newPassword
    - oldPassword
    type: object
  input.AdminDeleteReq:
    properties:
      id:
        description: 管理员ID
        example: 2
        type: integer
    required:
    - id
    type: object
  input.AdminListPageReq:
    properties:
      enable:
        description: 是否启用
        enum:
        - 0
        - 1
        example: 1
        type: integer
      gender:
        description: 性别
        enum:
        - 0
        - 1
        - 2
        example: 1
        type: integer
      pageNo:
        description: 页码
        example: 1
        type: integer
      pageSize:
        description: 每页展示条数
        example: 20
        type: integer
      username:
        description: 用户名，支持模糊搜索
        example: admin
        type: string
    required:
    - pageNo
    - pageSize
    type: object
  input.AdminLoginReq:
    properties:
      captcha:
        description: 验证码
        type: string
      password:
        description: 密码
        example: "123456"
        maxLength: 32
        minLength: 6
        type: string
      username:
        description: 账号
        example: admin
        minLength: 1
        type: string
    required:
    - password
    - username
    type: object
  input.AdminRefreshReq:
    properties:
      token:
        description: refresh token
        example: Bearer xxxxxxxxxx
        type: string
    required:
    - token
    type: object
  input.AdminResetAdminPasswordReq:
    properties:
      id:
        description: 管理员ID
        example: 1
        type: integer
      password:
        description: 密码
        example: "123456"
        maxLength: 32
        minLength: 6
        type: string
    required:
    - id
    - password
    type: object
  input.AdminSaveReq:
    properties:
      enable:
        description: 状态
        example: true
        type: boolean
      id:
        description: 管理员ID
        example: 1
        type: integer
      password:
        description: 密码
        example: "123456"
        type: string
      roleIds:
        description: 角色ID组
        example:
        - 1
        - 2
        items:
          type: integer
        type: array
      username:
        description: 账号
        example: admin
        minLength: 1
        type: string
    required:
    - username
    type: object
  input.AdminSwitchRoleReq:
    properties:
      code:
        description: 角色标识
        example: SUPER_ADMIN
        type: string
    required:
    - code
    type: object
  input.AdminUpdateProfileReq:
    properties:
      address:
        description: 居住地址
        example: xxxxxxx
        type: string
      avatar:
        description: 头像地址
        example: https://cdn.hejunjie.life/avatars/oneadmin.jpeg
        type: string
      email:
        description: email
        example: xxxxx@xxx.com
        type: string
      gender:
        description: 性别
        enum:
        - 0
        - 1
        - 2
        example: 1
        type: integer
      id:
        description: 管理员ID
        example: 1
        type: integer
      nickName:
        description: 名称
        example: test name
        type: string
    required:
    - id
    type: object
  input.MenuButtonsReq:
    properties:
      parentId:
        description: 菜单ID（作为父级ID进行查询）
        example: 0
        type: integer
    required:
    - parentId
    type: object
  input.MenuDeleteReq:
    properties:
      id:
        description: 菜单ID
        example: 1
        type: integer
    required:
    - id
    type: object
  input.MenuSaveReq:
    properties:
      code:
        description: 菜单标识
        example: Base
        minLength: 1
        type: string
      component:
        description: 组件路径
        example: /src/list/list.vue
        type: string
      enable:
        description: 状态
        example: true
        type: boolean
      icon:
        description: 菜单图标
        example: i-fe:list
        type: string
      id:
        description: 菜单ID
        example: 1
        type: integer
      keepAlive:
        description: 保持活跃
        example: false
        type: boolean
      layout:
        description: 布局
        example: full
        type: string
      name:
        description: 菜单名称
        example: 基础菜单
        minLength: 1
        type: string
      order:
        description: 排序（从小到大）
        example: 0
        type: integer
      parentId:
        description: 父级ID
        example: 0
        type: integer
      path:
        description: 菜单路径
        example: /path/url
        type: string
      show:
        description: 显示状态
        example: true
        type: boolean
      type:
        description: 菜单类型
        enum:
        - BUTTON
        - MENU
        example: MENU
        minLength: 1
        type: string
    required:
    - code
    - name
    - type
    type: object
  input.MenuToggleReq:
    properties:
      id:
        description: 菜单ID
        example: 1
        type: integer
    required:
    - id
    type: object
  input.MenuValidateReq:
    properties:
      path:
        description: 菜单路径
        example: /path/url
        minLength: 1
        type: string
    required:
    - path
    type: object
  input.RoleAddRoleUsersReq:
    properties:
      adminIds:
        description: 管理员ID（支持多个）
        example:
        - 1
        - 2
        - 3
        items:
          type: integer
        type: array
      roleId:
        description: 角色ID
        example: 2
        type: integer
    required:
    - adminIds
    - roleId
    type: object
  input.RoleDeleteReq:
    properties:
      id:
        description: 角色ID
        example: 2
        type: integer
    required:
    - id
    type: object
  input.RoleListPageReq:
    properties:
      enable:
        description: 状态
        enum:
        - 0
        - 1
        example: 1
        type: integer
      name:
        description: 名称，支持模糊搜索
        example: 超级
        type: string
      pageNo:
        description: 页码
        example: 1
        type: integer
      pageSize:
        description: 每页展示条数
        example: 20
        type: integer
    required:
    - pageNo
    - pageSize
    type: object
  input.RoleRemoveRoleUsersReq:
    properties:
      adminIds:
        description: 管理员ID（支持多个）
        example:
        - 1
        - 2
        - 3
        items:
          type: integer
        type: array
      roleId:
        description: 角色ID
        example: 2
        type: integer
    required:
    - adminIds
    - roleId
    type: object
  input.RoleSaveReq:
    properties:
      code:
        description: 角色标识
        example: TestAdmin
        type: string
      enable:
        description: 状态
        example: true
        type: boolean
      id:
        description: 角色ID
        example: 2
        type: integer
      name:
        description: 角色名称
        example: 测试管理员
        type: string
      permissionIds:
        description: 角色绑定菜单ID
        example:
        - 1
        - 2
        - 3
        items:
          type: integer
        type: array
    type: object
  resp.AdminDetailsProfileItem:
    properties:
      address:
        description: 居住地址
        example: xxxxxxx
        type: string
      avatar:
        description: 头像
        example: https://cdn.hejunjie.life/avatars/oneadmin.jpeg
        type: string
      email:
        description: email
        example: xxxxx@xxx.com
        type: string
      gender:
        description: 性别
        enum:
        - 0
        - 1
        - 2
        example: 1
        type: integer
      id:
        description: 管理员ID
        example: 1
        type: integer
      nickName:
        description: 名称
        example: test name
        type: string
    type: object
  resp.AdminDetailsResp:
    properties:
      createdAt:
        description: 创建时间
        example: "2026-03-25 12:00:00"
        type: string
      currentRole:
        allOf:
        - $ref: '#/definitions/resp.AdminDetailsRoleItem'
        description: 当前角色信息
      enable:
        description: 状态
        example: true
        type: boolean
      id:
        description: 管理员ID
        example: 1
        type: integer
      profile:
        allOf:
        - $ref: '#/definitions/resp.AdminDetailsProfileItem'
        description: 个人资料
      roles:
        description: 拥有角色列表
        items:
          $ref: '#/definitions/resp.AdminDetailsRoleItem'
        type: array
      updatedAt:
        description: 更新时间
        example: "2026-03-25 12:00:00"
        type: string
      username:
        description: 账号
        example: admin
        type: string
    type: object
  resp.AdminDetailsRoleItem:
    properties:
      code:
        description: 角色标识
        example: SUPER_ADMIN
        type: string
      enable:
        description: 状态
        example: true
        type: boolean
      id:
        description: 角色ID
        example: 1
        type: integer
      name:
        description: 角色名称
        example: 超级管理员
        type: string
    type: object
  resp.AdminListPageItem:
    properties:
      address:
        description: 居住地址
        example: xxxxxxx
        type: string
      avatar:
        description: 头像地址
        example: https://cdn.hejunjie.life/avatars/oneadmin.jpeg
        type: string
      createdAt:
        description: 创建时间
        type: string
      email:
        description: email
        example: xxxxx@xxx.com
        type: string
      enable:
        description: 状态
        example: true
        type: boolean
      gender:
        description: 性别
        enum:
        - 0
        - 1
        - 2
        example: 1
        type: integer
      id:
        description: 管理员ID
        example: 1
        type: integer
      roles:
        description: 拥有角色列表
        items:
          $ref: '#/definitions/resp.AdminDetailsRoleItem'
        type: array
      updatedAt:
        description: 更新时间
        type: string
      username:
        description: 账号
        example: admin
        type: string
    type: object
  resp.AdminListPageResp:
    properties:
      pageData:
        description: 当前页码数据
        items:
          $ref: '#/definitions/resp.AdminListPageItem'
        type: array
      total:
        description: 总计条数
        example: 100
        type: integer
    type: object
  resp.AdminLoginResp:
    properties:
      accessToken:
        description: access token
        example: Bearer xxxxxxxxxx
        type: string
      refreshToken:
        description: refresh token
        example: Bearer xxxxxxxxxx
        type: string
    type: object
  resp.MenuButtonsResp:
    properties:
      pageData:
        description: 当前页码数据
        items:
          $ref: '#/definitions/resp.MenuItem'
        type: array
      total:
        description: 总计条数
        example: 100
        type: integer
    type: object
  resp.MenuItem:
    properties:
      children:
        description: 子菜单
        items:
          $ref: '#/definitions/resp.MenuItem'
        type: array
      code:
        description: 菜单标识
        example: Base
        type: string
      component:
        description: 组件路径
        example: /src/list/list.vue
        type: string
      description:
        description: 描述
        type: string
      enable:
        description: 状态
        example: true
        type: boolean
      icon:
        description: 菜单图标
        example: i-fe:list
        type: string
      id:
        description: 菜单ID
        example: 1
        type: integer
      keepAlive:
        description: 保持活跃
        example: false
        type: boolean
      layout:
        description: 布局
        example: full
        type: string
      method:
        description: 方法
        type: string
      name:
        description: 菜单名称
        example: 基础菜单
        type: string
      order:
        description: 排序（从小到大）
        example: 0
        type: integer
      parentId:
        description: 父级ID
        example: 0
        type: integer
      path:
        description: 菜单路径
        example: /path/url
        type: string
      redirect:
        description: 重定向
        type: string
      show:
        description: 显示状态
        example: true
        type: boolean
      type:
        description: 菜单类型
        enum:
        - BUTTON
        - MENU
        example: MENU
        type: string
    type: object
  resp.MenuListResp:
    properties:
      menu:
        description: 菜单列表
        items:
          $ref: '#/definitions/resp.MenuItem'
        type: array
    type: object
  resp.MenuValidateResp:
    properties:
      has:
        description: 是否存在
        example: true
        type: boolean
    type: object
  resp.RoleListAllItem:
    properties:
      code:
        description: 角色标识
        example: SUPER_ADMIN
        type: string
      enable:
        description: 状态
        example: true
        type: boolean
      id:
        description: 角色ID
        example: 1
        type: integer
      name:
        description: 角色名称
        example: 超级管理员
        type: string
    type: object
  resp.RoleListAllResp:
    properties:
      list:
        description: 角色列表
        items:
          $ref: '#/definitions/resp.RoleListAllItem'
        type: array
    type: object
  resp.RoleListPageItem:
    properties:
      code:
        description: 角色标识
        example: SUPER_ADMIN
        type: string
      enable:
        description: 状态
        example: true
        type: boolean
      id:
        description: 角色ID
        example: 1
        type: integer
      name:
        description: 角色名称
        example: 超级管理员
        type: string
      permissionIds:
        description: 角色绑定菜单ID
        items:
          type: integer
        type: array
    type: object
  resp.RoleListPageResp:
    properties:
      pageData:
        description: 当前页码数据
        items:
          $ref: '#/definitions/resp.RoleListPageItem'
        type: array
      total:
        description: 总计条数
        example: 100
        type: integer
    type: object
  resp.RoleMenuItem:
    properties:
      children:
        description: 子菜单
        items:
          $ref: '#/definitions/resp.RoleMenuItem'
        type: array
      code:
        description: 菜单标识
        example: Base
        type: string
      component:
        description: 组件路径
        example: /src/list/list.vue
        type: string
      description:
        description: 描述
        type: string
      enable:
        description: 状态
        example: true
        type: boolean
      icon:
        description: 菜单图标
        example: i-fe:list
        type: string
      id:
        description: 菜单ID
        example: 1
        type: integer
      keepAlive:
        description: 保持活跃
        example: false
        type: boolean
      layout:
        description: 布局
        example: full
        type: string
      method:
        description: 方法
        type: string
      name:
        description: 菜单名称
        example: 基础菜单
        type: string
      order:
        description: 排序（从小到大）
        example: 0
        type: integer
      parentId:
        description: 父级ID
        example: 0
        type: integer
      path:
        description: 菜单路径
