info:
  contact:
    email: junjie.he.925@gmail.com
    name: API 支持
  description: OneAdmin 系统接口文档
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
  title: OneAdmin API
  version: "1.0"
paths:
  /api/admin/admin/delete:
    post:
      description: 根据管理员 ID 删除管理员账号（通常不允许删除当前登录管理员）
      parameters:
      - default: zh
        description: '语言标识（zh: 中文，en: English）'
        enum:
        - zh
        - en
        in: header
        name: Accept-Language
        type: string
      - description: 删除参数（管理员 ID）
        in: body
        name: data
        required: true
        schema:
          $ref: '#/definitions/input.AdminDeleteReq'
      responses:
        "200":
          description: 统一响应（code=0成功，其它失败）
          schema:
            $ref: '#/definitions/response.Response'
      security:
      - BearerAuth: []
      summary: 删除管理员
      tags:
      - 管理员
  /api/admin/admin/list:
    post:
      description: 分页获取管理员列表，支持按用户名、性别、启用状态进行筛选
      parameters:
      - default: zh
        description: '语言标识（zh: 中文，en: English）'
        enum:
        - zh
        - en
        in: header
        name: Accept-Language
        type: string
      - description: 请求参数
        in: body
        name: data
        required: true
        schema:
          $ref: '#/definitions/input.AdminListPageReq'
      responses:
        "200":
          description: 统一响应（code=0成功，其它失败）
          schema:
            allOf:
            - $ref: '#/definitions/response.Response'
            - properties:
                data:
                  $ref: '#/definitions/resp.AdminListPageResp'
              type: object
      security:
      - BearerAuth: []
      summary: 分页查询管理员列表
      tags:
      - 管理员
  /api/admin/admin/save:
    post:
      description: 根据是否传入 ID 创建或更新管理员账号：未传 ID 时为创建，传入 ID 时为更新，同时可设置账号状态及绑定角色
      parameters:
      - default: zh
        description: '语言标识（zh: 中文，en: English）'
        enum:
        - zh
        - en
        in: header
        name: Accept-Language
        type: string
      - description: 管理员保存参数
        in: body
        name: data
        required: true
        schema:
          $ref: '#/definitions/input.AdminSaveReq'
      responses:
        "200":
          description: 统一响应（code=0成功，其它失败）
          schema:
            $ref: '#/definitions/response.Response'
      security:
      - BearerAuth: []
      summary: 创建或更新管理员
      tags:
      - 管理员
  /api/admin/admin/update-password:
    post:
      description: 管理员根据管理员 ID 重置指定账号的登录密码（无需旧密码，通常需要具备管理员管理权限）
      parameters:
      - default: zh
        description: '语言标识（zh: 中文，en: English）'
        enum:
        - zh
        - en
        in: header
        name: Accept-Language
        type: string
      - description: 重置密码参数
        in: body
        name: data
        required: true
        schema:
          $ref: '#/definitions/input.AdminResetAdminPasswordReq'
      responses:
        "200":
          description: 统一响应（code=0成功，其它失败）
          schema:
            $ref: '#/definitions/response.Response'
      security:
      - BearerAuth: []
      summary: 重置管理员密码
      tags:
      - 管理员
  /api/admin/admin/update-profile:
    post:
      description: 管理员更新个人资料信息（如昵称、头像、性别、邮箱等），支持部分字段更新
      parameters:
      - default: zh
        description: '语言标识（zh: 中文，en: English）'
        enum:
        - zh
        - en
        in: header
        name: Accept-Language
        type: string
      - description: 管理员个人资料参数
        in: body
        name: data
        required: true
        schema:
          $ref: '#/definitions/input.AdminUpdateProfileReq'
      responses:
        "200":
          description: 统一响应（code=0成功，其它失败）
          schema:
            $ref: '#/definitions/response.Response'
      security:
      - BearerAuth: []
      summary: 更新管理员个人资料
      tags:
      - 管理员
  /api/admin/auth/change-password:
    post:
      description: 管理员在已登录状态下通过旧密码验证后修改登录密码，修改成功后建议重新登录以获取新的凭证
      parameters:
      - default: zh
        description: '语言标识（zh: 中文，en: English）'
        enum:
        - zh
        - en
        in: header
        name: Accept-Language
        type: string
      - description: 修改密码参数
        in: body
        name: data
        required: true
        schema:
          $ref: '#/definitions/input.AdminChangePasswordReq'
      responses:
        "200":
          description: 统一响应（code=0成功，其它失败）
          schema:
            $ref: '#/definitions/response.Response'
      security:
      - BearerAuth: []
      summary: 修改登录密码
      tags:
      - 认证
  /api/admin/auth/detail:
    post:
      description: 获取当前登录管理员的详细信息，包括基础信息、个人资料、拥有角色列表及当前角色信息
      parameters:
      - default: zh
        description: '语言标识（zh: 中文，en: English）'
        enum:
        - zh
        - en
        in: header
        name: Accept-Language
        type: string
      responses:
        "200":
          description: 统一响应（code=0成功，其它失败）
          schema:
            allOf:
            - $ref: '#/definitions/response.Response'
            - properties:
                data:
                  $ref: '#/definitions/resp.AdminDetailsResp'
              type: object
      security:
      - BearerAuth: []
      summary: 获取当前管理员信息
      tags:
      - 认证
  /api/admin/auth/login:
    post:
      description: 管理员通过账号和密码登录系统，登录成功后返回 access_token 和 refresh_token，用于后续接口鉴权
      parameters:
      - default: zh
        description: '语言标识（zh: 中文，en: English）'
        enum:
        - zh
        - en
