# 错误码规则说明
#
# 格式：T MM XX
# 示例：1 00 01
#
# │ │  └─ 具体错误（XX）：同一模块下的具体错误编号，从 01 开始递增
# │ └──── 模块编号（MM）：标识错误所属模块
# └────── 错误类型（T）：标识错误大类
#
# --------------------------------------------------
# 错误类型说明（T）
#
# 1 参数/请求错误（Request）
#   - 只处理“请求本身有问题”
#   - 如：参数缺失、类型错误、格式错误、JSON解析失败等
#   - ❗ 不包含业务逻辑判断
#
# 2 认证错误（AuthN）
#   - “你是谁”没搞清楚
#   - 如：未登录、Token无效、Token过期等
#
# 3 权限错误（AuthZ）
#   - “你是谁”没问题，但“你不能这么干”
#   - 如：非管理员操作、越权访问等
#
# 4 业务错误（Business）
#   - 请求是合法的，但业务不成立（最常用的一类）
#   - 如：密码错误、余额不足、状态不允许、验证码错误等
#
# 5 资源错误（Resource）
#   - 只表示“资源不存在”
#   - 如：用户不存在、订单不存在、商品不存在等
#   - ❗ 不包含权限或业务判断
#
# 6 系统错误（System）
#   - 服务器内部异常
#   - 如：数据库错误、缓存错误、第三方服务异常、未捕获panic等
#
# --------------------------------------------------
# 模块编号说明（MM）
#
# 00 通用模块（Common）
#    - 通用错误，如参数校验失败等
#
# 01 管理员模块（Admin）
# 02 角色模块（Role）
# 03 菜单模块（Menu）
#
# （可根据实际业务继续扩展，建议按功能划分，保持稳定）
#
# --------------------------------------------------
# 设计约定（建议遵守）
#
# 1. 同一错误类型 + 模块下，错误码唯一
# 2. XX 从 01 开始递增，不要复用
# 3. 尽量保证错误语义清晰，避免“一个码多种含义”
# 4. 业务错误（4xx）优先使用，不要滥用参数错误（1xx）
# 5. 资源错误（5xx）只用于“是否存在”，不要混入权限/业务逻辑
# 6. 系统错误（6xx）尽量少暴露细节，前端统一提示
#
# --------------------------------------------------
# 示例
#
# 10001 参数错误（通用）
# 20101 Token已过期（认证-管理员模块）
# 30201 无权限操作（权限-用户模块）
# 40301 密码错误（业务-管理员模块）
# 50201 用户不存在（资源-用户模块）
# 60001 数据库异常（系统-通用模块）
#
error:
