  10206: 请至少为该角色分配一个菜单 # 角色最少需要绑定1个菜单

  10301: 请求参数不合法 # 参数校验失败
  10302: 请输入路径信息 # 路径信息不能为空
  10303: 请输入菜单标识 # 菜单 Code 不能为空
  10304: 请选择菜单类型 # 菜单类型不能为空
  10305: 请输入菜单名称 # 菜单名称不能为空

  20001: 登录已过期，请重新登录 # accessToken / session 失效

  30101: 无法切换到该角色 # 当前账号没有切换到该角色的权限

  40101: 账号或密码错误 # 密码错误（避免提示过于具体）
  40102: 当前账号不可用 # 管理员账号已停用
  40103: 当前角色不可用 # 角色已停用
  40104: 新密码不能与旧密码相同 # 新旧密码一致

  50101: 管理员不存在或已被删除 # 未能查询到管理员信息
  50102: 角色不存在或已被删除 # 未能查询到角色信息

  50201: 角色不存在或已被删除 # 未能查询到角色信息

  60101: 系统繁忙，请稍后重试 # 数据库查询异常
  60102: 系统繁忙，请稍后重试 # accessToken 生成失败
