  10105: 登录状态异常，请重新登录 # Authorization 解析失败
  10106: 登录状态异常，请重新登录 # accessToken 解析失败
  10107: 登录状态异常，请重新登录 # accessToken 数据异常
  10108: 请输入账号 # 账号不能为空
  10109: 请输入密码 # 密码不能为空
  10110: 密码长度不能少于6位 # 密码长度 < 6
  10111: 密码长度不能超过32位 # 密码长度 > 32
  10112: 请选择角色 # 角色不能为空
  10113: 请输入昵称 # 昵称不能为空
  10114: 请至少为该账号分配一个角色 # 管理员最少需要绑定1个角色
  
  10201: 请求参数不合法 # 参数校验失败
  10202: 请输入角色标识 # 角色 Code 不能为空
  10203: 请输入角色名称 # 角色名称不能为空
